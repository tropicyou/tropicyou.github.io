title: 'TropicYou | Tutorial Rajut, Properti, & Produk Alami'
name: TropicYou
description: >-
  Komunitas kreatif & marketplace Malang. Temukan tutorial rajut, jual beli
  properti & barang bekas (tanah, rumah, sepeda), produk herbal shampoo alami, serta galeri rajutan custom.
email: mail@tropi.cyou
author: Admin TropicYou
url: 'https://www.tropi.cyou'
baseurl: ''
date_format: '%d %B %Y'
lang: id
jekyll_aeo:
  llms_txt:
    description: "Komunitas kreatif & marketplace Malang. Temukan tutorial rajut, jual beli properti & barang bekas (tanah, rumah, sepeda), produk herbal shampoo alami, serta galeri rajutan custom."
twitter_username: null
facebook_username: null
instagram_username: irenenatadihardja
github_username: null
paginate: 5
paginate_path: '/artikel/page:num/'
permalink: '/:categories/:year/:month/:day/:title/'
disqus_comments: 'yes'
disqus_shortname: glitche-jekyll-theme
formsubmit_email: mail@tropi.cyou
collections:
  works:
    output: true
    permalink: '/:collection/:path/'
  posts:
    output: true
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: archive
    tag: archive
  permalinks:
    category: '/categories/:name/'
    tag: '/tags/:name/'
plugins:
  - jekyll-archives
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
include:
  - llms.txt
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
sass:
  style: compressed
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  auto_ids: true
