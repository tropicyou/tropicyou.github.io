name: Build and Deploy Jekyll to GitHub Pages

on:
  push:
    branches:
      - main   # Trigger saat push ke branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'        # Sesuaikan dengan versi Ruby Anda
          bundler-cache: true         # Otomatis bundle install

      - name: Build site
        run: JEKYLL_ENV=production bundle exec jekyll build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages    # Hasil build dikirim ke sini
          force_orphan: false         # Biarkan history tetap ada
          keep_files: false           # Hapus file lama di gh-pages
- name: List contents of _site
  run: ls -la _site && ls -la _site/categories _site/tags || echo "No categories/tags"
