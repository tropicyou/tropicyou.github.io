<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  {%- include head.html -%}

  <body class="{% if page.layout == 'home' %} home{% endif %}{% if page.layout == 'post' %} artikel{% endif %}">
    
    {%- include preloader.html -%}

    <!-- Container -->
    <div class="container">
      <!-- Cursor -->
      <div class="cursor-follower"></div>
        
      {%- include header.html -%}
      
      <!-- Wrapper -->
      <div class="wrapper">
        {{ content }}
      </div>
      
      {%- include footer.html -%}

      <!-- Lines -->
      <div class="lines">
        <div class="content">
          <div class="line-col"></div>
          <div class="line-col"></div>
          <div class="line-col"></div>
          <div class="line-col"></div>
          <div class="line-col"></div>
        </div>
      </div>
    </div>
    
    {%- include scripts.html -%}
<!-- BEGIN MerchantWidget Code -->
<script id='merchantWidgetScript' src='https://www.gstatic.com/shopping/merchant/merchantwidget.js' defer></script>
<script>
  merchantWidgetScript.addEventListener('load', function () {
    merchantwidget.start({
      merchant_id: 5763655972, // Ganti dengan Merchant ID Anda
      position: 'RIGHT_BOTTOM' // Pilihan: 'RIGHT_BOTTOM' atau 'LEFT_BOTTOM'
    });
  });
</script>
<!-- END MerchantWidget Code -->
  </body>

</html>
